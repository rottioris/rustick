name: Build Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
          - platform: ubuntu-latest
            args: --bundles appimage
          - platform: macos-latest
            args: --bundles dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show versions
        run: |
          echo "== System =="
          node --version
          npm --version
          echo "== Rust =="
          rustc --version
          cargo --version
          echo "== Platform =="
          echo ${{ matrix.platform }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        if: startsWith(github.ref_name, 'v')
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          node -e "
            const VERSION = process.env.TAG_VERSION.replace(/^v/, '');
            const fs = require('fs');
            
            // Update tauri.conf.json
            const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            config.version = VERSION;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(config, null, 2));
            
            // Update Cargo.toml - support both single and double quotes
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^\"version = \\\"[0-9]+\.[0-9]+\.[0-9]+\\\"$\"/m, '\"version = \"' + VERSION + '\"');
            cargo = cargo.replace(/^version = '[0-9]+\.[0-9]+\.[0-9]+'$/m, \"version = '\" + VERSION + \"'\");
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
            
            console.log('Version set to', VERSION);
          "

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pomodoro Timer ${{ github.ref_name }}'
          releaseBody: 'Automated release build for Pomodoro Timer'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}