name: Build Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
          - platform: ubuntu-latest
            args: --bundles appimage
          - platform: macos-latest
            args: --bundles dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show versions
        run: |
          echo "== System =="
          node --version
          npm --version
          echo "== Rust =="
          rustc --version
          cargo --version
          echo "== Platform =="
          echo ${{ matrix.platform }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        if: startsWith(github.ref_name, 'v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            config.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(config, null, 2));
          "
          node -e "
            const fs = require('fs');
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/version = \"[^\"]*\"/g, 'version = \"$VERSION\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
          "
          echo "Version set to $VERSION"

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        continue-on-error: true

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pomodoro Timer ${{ github.ref_name }}'
          releaseBody: 'Automated release build for Pomodoro Timer'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}